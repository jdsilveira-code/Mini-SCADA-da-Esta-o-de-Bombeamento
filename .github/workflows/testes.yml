name: Testes

on:
  push:
  pull_request:

jobs:
  cpp:
    name: C++ - controlador
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Compilar testes C++
        working-directory: dispositivo_cpp
        run: |
          mkdir -p build
          g++ -std=c++17 -Wall -Wextra -pedantic -Iinclude \
          src/Alarmes.cpp \
          src/Atuadores.cpp \
          src/EstrategiaControle.cpp \
          src/GeradorNumeros.cpp \
          src/JsonExporter.cpp \
          src/Sensores.cpp \
          src/EstadoReator.cpp \
          tests/test_controle.cpp \
          -o build/test_controle

      - name: Executar testes C++
        working-directory: dispositivo_cpp
        run: ./build/test_controle

  python:
    name: Python - supervisor
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Executar testes Python
        working-directory: supervisor_python
        run: python -m pytest -q